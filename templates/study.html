<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>出牌练习</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: #1a1a2e;
      color: #ecf0f1;
      font-family: -apple-system, "Helvetica Neue", sans-serif;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    /* ── nav ── */
    .navbar {
      display: flex;
      align-items: center;
      padding: 12px 14px 8px;
      gap: 10px;
    }
    .back-btn {
      background: #0f3460;
      color: #ecf0f1;
      border: none;
      border-radius: 8px;
      padding: 7px 13px;
      font-size: 0.85em;
      cursor: pointer;
      text-decoration: none;
      -webkit-appearance: none;
    }
    .back-btn:active { background: #e94560; }
    .nav-title { color: #2ecc71; font-size: 1.1em; font-weight: 600; }

    /* ── panels ── */
    .panel {
      background: #16213e;
      margin: 0 10px 8px;
      border-radius: 12px;
      padding: 10px 12px;
    }
    .panel-label { font-size: 0.76em; color: #7f8c8d; margin-bottom: 8px; }

    /* ── 14-tile grid ── */
    .hand-row { display: flex; gap: 3px; }
    .hand-row + .hand-row { margin-top: 6px; }

    .tile-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1;
      max-width: 46px;
    }
    .tile-slot img {
      width: 100%;
      height: auto;
      border-radius: 5px;
      border: 2px solid transparent;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: block;
    }
    .tile-slot.best img {
      border-color: #2ecc71;
      box-shadow: 0 0 8px rgba(46,204,113,0.65);
    }
    .tile-slot.zero img { opacity: 0.45; }

    .score {
      font-size: 0.7em;
      font-weight: 700;
      height: 15px;
      line-height: 15px;
      color: #7f8c8d;
    }
    .score.hidden    { visibility: hidden; }
    .score.is-zero   { color: #3d4d5c; }
    .score.is-low    { color: #e67e22; }
    .score.is-mid    { color: #f39c12; }
    .score.is-best   { color: #2ecc71; }

    /* ── buttons ── */
    .btn-row { display: flex; gap: 8px; margin: 0 10px 8px; }
    .btn {
      flex: 1;
      background: #0f3460;
      color: #ecf0f1;
      border: none;
      border-radius: 9px;
      padding: 11px 6px;
      font-size: 0.88em;
      cursor: pointer;
      -webkit-appearance: none;
    }
    .btn:active { background: #e94560; color: #fff; }
    .btn-gen     { color: #1abc9c; font-weight: 600; }
    .btn-analyze { color: #2ecc71; font-weight: 600; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }

    /* ── discard cards ── */
    .discard-list { display: flex; flex-direction: column; gap: 8px; }

    .discard-card {
      background: #0a2540;
      border-radius: 10px;
      padding: 8px 10px;
      border: 1.5px solid transparent;
    }
    .discard-card.best { border-color: #2ecc71; }
    .discard-card.zero { opacity: 0.55; }

    /* header row: tile + score + badge */
    .dc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .dc-score {
      font-size: 1.0em;
      font-weight: 700;
      color: #f39c12;
    }
    .dc-score.zero { color: #4a5568; font-size: 0.88em; }
    .dc-badge {
      margin-left: auto;
      font-size: 0.72em;
      color: #2ecc71;
      font-weight: 600;
    }
    .dc-no-tenpai {
      font-size: 0.8em;
      color: #4a5568;
      font-style: italic;
      margin-left: 4px;
    }

    /* waited tiles row */
    .dc-waits {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .wait-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #16213e;
      border-radius: 7px;
      padding: 4px 7px 4px 5px;
    }
    .wait-chip img { display: block; border-radius: 3px; }
    .wait-chip-info { display: flex; flex-direction: column; line-height: 1.25; }
    .wait-chip-mult { font-size: 0.75em; color: #f39c12; font-weight: 600; }
    .wait-chip-rem  { font-size: 0.68em; color: #7f8c8d; }
    .wait-chip-type { font-size: 0.65em; color: #9b59b6; }

    .spinner { color: #3498db; font-style: italic; font-size: 0.9em; }
    .result-dim { color: #7f8c8d; font-size: 0.85em; }
  </style>
</head>
<body>

<div class="navbar">
  <a href="/" class="back-btn">← 返回</a>
  <span class="nav-title">出牌练习 · 饼</span>
</div>

<div class="panel">
  <div class="panel-label" id="handLabel">生成14张饼手牌，分析最优出牌</div>
  <div class="hand-row" id="row1"></div>
  <div class="hand-row" id="row2"></div>
</div>

<div class="btn-row">
  <button class="btn btn-gen"     onclick="generate()">♟ 生成手牌</button>
  <button class="btn btn-analyze" onclick="analyze()" id="btnAnalyze" disabled>▶ 分析出牌</button>
</div>

<div class="panel" id="results">
  <div class="result-dim">点击「生成手牌」开始。</div>
</div>

<script>
const TILE_ORDER = {};
['m','p','s'].forEach((s, si) => {
  for (let n = 1; n <= 9; n++) TILE_ORDER[`${n}${s}`] = si * 9 + (n - 1);
});

const HAND_H = 58;
let hand = [];

function imgSrc(t) { return `/tiles/${t}.png`; }
function setResults(html) { document.getElementById('results').innerHTML = html; }
function setLoading(msg)  { setResults(`<div class="spinner">⏳ ${msg}</div>`); }

// ── render 14-tile grid ───────────────────────────────────────────────────────
function renderHand(scores) {
  const r1 = document.getElementById('row1');
  const r2 = document.getElementById('row2');
  r1.innerHTML = ''; r2.innerHTML = '';
  if (!hand.length) return;

  const maxScore = scores ? Math.max(...scores.map(s => s.multiplier_sum)) : 0;

  hand.forEach((tile, i) => {
    const slot = document.createElement('div');
    slot.className = 'tile-slot';

    const img = document.createElement('img');
    img.src = imgSrc(tile); img.alt = tile; img.height = HAND_H;
    slot.appendChild(img);

    const badge = document.createElement('div');
    badge.className = 'score' + (scores ? '' : ' hidden');

    if (scores) {
      const ms = scores[i].multiplier_sum;
      badge.textContent = ms;
      if (ms === 0) {
        badge.classList.add('is-zero');
        slot.classList.add('zero');
      } else {
        const ratio = maxScore > 0 ? ms / maxScore : 0;
        if (ratio >= 1.0) { badge.classList.add('is-best'); slot.classList.add('best'); }
        else if (ratio >= 0.6) badge.classList.add('is-mid');
        else badge.classList.add('is-low');
      }
    }
    slot.appendChild(badge);
    (i < 7 ? r1 : r2).appendChild(slot);
  });
}

// ── generate ──────────────────────────────────────────────────────────────────
async function generate() {
  setLoading('生成14张饼手牌…');
  document.getElementById('btnAnalyze').disabled = true;

  const d = await fetch('/api/random/no-win-p14').then(r => r.json());
  hand = d.tiles.sort((a, b) => TILE_ORDER[a] - TILE_ORDER[b]);
  renderHand(null);
  document.getElementById('handLabel').textContent = '14张饼手牌（未胡）· 点击「分析出牌」';
  document.getElementById('btnAnalyze').disabled = false;
  setResults('<div class="result-dim">点击「分析出牌」查看每种出牌的听牌分析。</div>');
}

// ── analyze ───────────────────────────────────────────────────────────────────
async function analyze() {
  if (!hand.length) return;
  setLoading('分析所有出牌选择…');

  const d = await fetch('/api/analyze14', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({tiles: hand})
  }).then(r => r.json());

  const scores = d.results;
  const maxScore = Math.max(...scores.map(s => s.multiplier_sum));

  renderHand(scores);
  document.getElementById('handLabel').textContent = '绿框 = 最优出牌';

  // Deduplicate by tile value for the card list
  const seen = new Set();
  const unique = [];
  scores.forEach(s => { if (!seen.has(s.tile)) { seen.add(s.tile); unique.push(s); } });
  unique.sort((a, b) => b.multiplier_sum - a.multiplier_sum);

  let html = '<div class="discard-list">';

  unique.forEach(s => {
    const isBest = s.multiplier_sum === maxScore && maxScore > 0;
    const isZero = s.multiplier_sum === 0;

    html += `<div class="discard-card${isBest ? ' best' : ''}${isZero ? ' zero' : ''}">`;

    // Header row
    html += `<div class="dc-header">
      <img src="${imgSrc(s.tile)}" height="38" style="border-radius:4px">
      <span>打 ${s.tile[0]} 饼</span>`;

    if (isZero) {
      html += `<span class="dc-no-tenpai">无法听牌</span>`;
    } else {
      html += `<span class="dc-score">有效牌力&nbsp;${s.multiplier_sum}</span>`;
    }
    if (isBest) {
      html += `<span class="dc-badge">★ 最优</span>`;
    }
    html += `</div>`; // dc-header

    // Wait chips
    if (s.waits && s.waits.length > 0) {
      html += `<div class="dc-waits">`;
      s.waits.forEach(w => {
        const contrib = w.remaining * w.multiplier;
        html += `<div class="wait-chip">
          <img src="${imgSrc(w.tile)}" height="32">
          <div class="wait-chip-info">
            <span class="wait-chip-mult">×${w.multiplier}&ensp;贡献${contrib}</span>
            <span class="wait-chip-rem">剩${w.remaining}张</span>
            <span class="wait-chip-type">${w.labels.join('·')}</span>
          </div>
        </div>`;
      });
      html += `</div>`; // dc-waits
    }

    html += `</div>`; // discard-card
  });

  html += '</div>';
  setResults(html);
}

generate();
</script>
</body>
</html>
